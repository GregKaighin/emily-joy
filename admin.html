<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Emily Joy</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --rose:        #d4849e;
            --rose-light:  #eab0c0;
            --rose-dark:   #a05570;
            --gold:        #c9a96e;
            --dark:        #0c090b;
            --dark-card:   #1c1219;
            --dark-border: rgba(212,132,158,0.18);
            --text:        #f5eff2;
            --text-muted:  #907f86;
            --font-head:   'Cormorant Garamond', serif;
            --font-body:   'Raleway', sans-serif;
            --radius:      10px;
            --ease:        0.2s ease;
        }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 1rem 4rem;
        }
        .wrap { width: 100%; max-width: 700px; }

        /* Brand */
        .brand {
            font-family: var(--font-head);
            font-style: italic;
            font-size: 2rem;
            color: var(--rose-light);
            text-align: center;
            margin-bottom: 0.35rem;
        }
        .brand-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Card */
        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-family: var(--font-head);
            font-style: italic;
            font-size: 1.3rem;
            color: var(--rose-light);
            margin-bottom: 1.25rem;
        }

        /* Fields */
        .field { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        input, select {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 0.95rem;
            padding: 0.65rem 0.85rem;
            transition: border-color var(--ease);
            outline: none;
            -webkit-appearance: none;
        }
        input:focus, select:focus { border-color: var(--rose); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
        select option { background: #1c1219; }

        /* Form grid */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .form-grid .field-full { grid-column: 1 / -1; }
        @media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.45rem; border: none; border-radius: 6px; cursor: pointer;
            font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
            padding: 0.65rem 1.4rem;
            transition: background var(--ease), border-color var(--ease), color var(--ease), opacity var(--ease);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary  { background: var(--rose); color: #fff; width: 100%; margin-top: 0.5rem; }
        .btn-primary:hover:not(:disabled) { background: var(--rose-dark); }
        .btn-add      { background: var(--rose); color: #fff; white-space: nowrap; }
        .btn-add:hover:not(:disabled) { background: var(--rose-dark); }
        .btn-delete   { background: transparent; border: 1px solid rgba(255,80,80,0.3); color: rgba(255,120,120,0.8); padding: 0.35rem 0.75rem; font-size: 0.82rem; flex-shrink: 0; }
        .btn-delete:hover:not(:disabled) { border-color: rgba(255,80,80,0.7); color: #ff6060; }
        .btn-logout   { background: transparent; border: 1px solid var(--dark-border); color: var(--text-muted); font-size: 0.82rem; padding: 0.4rem 0.9rem; }
        .btn-logout:hover { border-color: var(--rose); color: var(--rose); }

        /* Error */
        .error { color: #ff8080; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

        /* Dashboard header */
        .dash-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .dash-header .brand { margin-bottom: 0; text-align: left; }

        /* Gig list */
        .gig-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.85rem 1rem; border-radius: 6px;
            border: 1px solid var(--dark-border);
            background: rgba(255,255,255,0.02);
            margin-bottom: 0.5rem;
        }
        .gig-item.past { opacity: 0.4; }
        .gig-info { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 0.35rem 0.75rem; }
        .gig-item-date { font-size: 0.8rem; color: var(--rose-light); font-weight: 600; }
        .gig-item-date .past-tag { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; margin-left: 0.3rem; }
        .gig-item-venue { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
        .gig-item-meta  { font-size: 0.8rem; color: var(--text-muted); }

        /* Act badges */
        .act-badge {
            font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
            border-radius: 20px; padding: 0.15rem 0.55rem; font-weight: 600;
        }
        .act-badge.duo  { background: rgba(201,169,110,0.15); color: #c9a96e; }
        .act-badge.joy  { background: rgba(212,132,158,0.15); color: var(--rose-light); }
        .act-badge.both { background: rgba(255,255,255,0.08); color: #aaa; }

        .empty { color: var(--text-muted); font-style: italic; text-align: center; padding: 1.5rem 0; font-size: 0.9rem; }
        .back { display: inline-block; color: var(--text-muted); font-size: 0.82rem; text-decoration: none; margin-top: 0.75rem; }
        .back:hover { color: var(--rose); }

        /* Login screen */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-box { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
<div class="wrap">

    <!-- Login -->
    <div id="login-screen">
        <div class="login-box">
            <div class="brand">Emily Joy</div>
            <p class="brand-sub">Gig Admin</p>
            <div class="card">
                <h1 class="card-title">Login</h1>
                <form id="login-form">
                    <div class="field">
                        <label for="admin-email">Email</label>
                        <input type="email" id="admin-email" autocomplete="username" required>
                    </div>
                    <div class="field">
                        <label for="admin-password">Password</label>
                        <input type="password" id="admin-password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                    <p class="error" id="login-error"></p>
                </form>
            </div>
            <a href="index.html" class="back">← Back to website</a>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="admin-screen" style="display:none; width:100%">
        <div class="dash-header">
            <div class="brand">Emily Joy</div>
            <button id="logout-btn" class="btn btn-logout">Logout</button>
        </div>

        <div class="card">
            <h2 class="card-title">Add a Gig</h2>
            <form id="add-gig-form">
                <div class="form-grid">
                    <div class="field">
                        <label for="gig-date">Date *</label>
                        <input type="date" id="gig-date" required>
                    </div>
                    <div class="field">
                        <label for="gig-time">Time</label>
                        <input type="text" id="gig-time" placeholder="e.g. 7:00pm">
                    </div>
                    <div class="field field-full">
                        <label for="gig-venue">Venue *</label>
                        <input type="text" id="gig-venue" placeholder="e.g. The Venue, Lincoln" maxlength="120" required>
                    </div>
                    <div class="field field-full">
                        <label for="gig-details">Details (optional)</label>
                        <input type="text" id="gig-details" placeholder="e.g. Wedding reception">
                    </div>
                    <div class="field field-full">
                        <label for="gig-act">Act *</label>
                        <select id="gig-act" required>
                            <option value="Emily Joy">Emily Joy</option>
                            <option value="Emily &amp; Greg Duo">Emily &amp; Greg Duo</option>
                            <option value="Both">Both</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-add" style="margin-top:0.75rem">Add Gig</button>
                <p class="error" id="add-error"></p>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">All Gigs</h2>
            <div id="admin-gigs-list"><p class="empty">Loading…</p></div>
        </div>

        <a href="index.html" class="back">← Back to website</a>
    </div>

</div>

<script src="js/firebase-config.js"></script>
<script>
(function () {
    let idToken = null;

    async function signIn(email, password) {
        const res  = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, returnSecureToken: true })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        return data.idToken;
    }

    async function fetchAllGigs() {
        const res  = await fetch(`${FIREBASE_DB_URL}/gigs.json`);
        const data = await res.json();
        return data ? Object.entries(data).map(([id, gig]) => ({ id, ...gig })) : [];
    }

    async function addGig(gigData) {
        const res = await fetch(`${FIREBASE_DB_URL}/gigs.json?auth=${idToken}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(gigData)
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.status); }
    }

    async function deleteGig(id) {
        const res = await fetch(`${FIREBASE_DB_URL}/gigs/${id}.json?auth=${idToken}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
    }

    function renderGigs(gigs) {
        const list  = document.getElementById('admin-gigs-list');
        const today = new Date(); today.setHours(0, 0, 0, 0);
        if (!gigs.length) { list.innerHTML = '<p class="empty">No gigs yet — add one above.</p>'; return; }
        gigs.sort((a, b) => new Date(a.date) - new Date(b.date));
        list.innerHTML = gigs.map(gig => {
            const isPast   = new Date(gig.date + 'T12:00:00') < today;
            const dateStr  = new Date(gig.date + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
            const actClass = gig.act === 'Emily Joy' ? 'joy' : gig.act === 'Both' ? 'both' : 'duo';
            const actLabel = gig.act || 'Emily Joy';
            return `
            <div class="gig-item${isPast ? ' past' : ''}">
                <div class="gig-info">
                    <span class="gig-item-date">${dateStr}${isPast ? '<span class="past-tag">(past)</span>' : ''}</span>
                    <span class="act-badge ${actClass}">${actLabel}</span>
                    <span class="gig-item-venue">${gig.venue}</span>
                    ${gig.time    ? `<span class="gig-item-meta">${gig.time}</span>` : ''}
                    ${gig.details ? `<span class="gig-item-meta">${gig.details}</span>` : ''}
                </div>
                <button class="btn btn-delete" data-id="${gig.id}">Delete</button>
            </div>`;
        }).join('');

        list.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('Delete this gig?')) return;
                btn.disabled = true;
                try { await deleteGig(btn.dataset.id); await refresh(); }
                catch { btn.disabled = false; }
            });
        });
    }

    async function refresh() {
        renderGigs(await fetchAllGigs());
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('login-error');
        errEl.textContent = '';
        try {
            idToken = await signIn(
                document.getElementById('admin-email').value.trim(),
                document.getElementById('admin-password').value
            );
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'block';
            await refresh();
        } catch (err) {
            errEl.textContent = 'Login failed: ' + err.message;
        }
    });

    document.getElementById('add-gig-form').addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('add-error');
        errEl.textContent = '';
        const gigData = {
            date:    document.getElementById('gig-date').value,
            venue:   document.getElementById('gig-venue').value.trim(),
            time:    document.getElementById('gig-time').value.trim(),
            details: document.getElementById('gig-details').value.trim(),
            act:     document.getElementById('gig-act').value
        };
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        try { await addGig(gigData); e.target.reset(); await refresh(); }
        catch (err) { errEl.textContent = 'Could not add gig: ' + err.message; }
        finally { btn.disabled = false; }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        idToken = null;
        document.getElementById('admin-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
    });
})();
</script>
</body>
</html>
